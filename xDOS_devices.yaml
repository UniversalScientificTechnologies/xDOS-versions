device_type:
  enum_name: DeviceType
  description: >
    Enumeration source for the EEPROM field `device_type`.
    This field contains only the alphabetic detector family name.
    The numeric device version and trailing hardware revision are stored separately
    in `hardware_version.device_version` and `hardware_version.hardware_revision`.

  values:
    - name: DEVICE_TYPE_UNKNOWN
      value: 0
      device_type: UNKNOWN
      description: Unknown or unspecified device family

    - name: DEVICE_TYPE_AIRDOS
      value: 1
      device_type: AIRDOS
      description: AIRDOS device family

    - name: DEVICE_TYPE_GEODOS
      value: 2
      device_type: GEODOS
      description: GEODOS device family

    - name: DEVICE_TYPE_LABDOS
      value: 3
      device_type: LABDOS
      description: LABDOS device family

    - name: DEVICE_TYPE_SPACEDOS
      value: 4
      device_type: SPACEDOS
      description: SPACEDOS device family

hardware_version:
  description: >
    Structure for the EEPROM field `hardware_version`.
    This splits the full product code into `device_version` and `hardware_revision`.

  device_version:
    type: uint8
    range: [1, 99]
    format: "%02u"
    description: Numeric device version appended to `device_type`

  hardware_revision:
    type: char
    nullable: true
    range: ["A", "Z"]
    description: Optional trailing hardware revision letter

